<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="round">
      <circle cx="32" cy="32" r="32"/>
    </clipPath>
  </defs>
  <g clip-path="url(#round)">
    <!-- background -->
    <rect width="64" height="64" fill="#E8F5EA"/>
    <!-- shoulders / Sber-green blazer -->
    <path d="M2 64 C 2 50 14 44 32 44 C 50 44 62 50 62 64 Z" fill="#21A038"/>
    <!-- white shirt collar V -->
    <path d="M27 44 L32 54 L37 44 Z" fill="#FFFFFF"/>
    <!-- neck -->
    <path d="M27 38 H 37 V 46 H 27 Z" fill="#E8B89A"/>
    <!-- ears -->
    <ellipse cx="19" cy="29" rx="2.2" ry="3" fill="#E8B89A"/>
    <ellipse cx="45" cy="29" rx="2.2" ry="3" fill="#E8B89A"/>
    <!-- head / face -->
    <ellipse cx="32" cy="27" rx="12" ry="14" fill="#F2C8A5"/>
    <!-- hair: short modern cut -->
    <path d="M20 22 C 20 12 27 9 32 9 C 38 9 44 13 44 22 C 44 22 41.5 17 38 17 C 34 17 32 19 28 19 C 24 19 21.5 19 20 22 Z" fill="#3B2A1B"/>
    <!-- eyebrows -->
    <path d="M25 22 q 2 -1.2 4 0" stroke="#3B2A1B" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M35 22 q 2 -1.2 4 0" stroke="#3B2A1B" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- eyes -->
    <ellipse cx="27" cy="27" rx="1.4" ry="1.6" fill="#2C2017"/>
    <ellipse cx="37" cy="27" rx="1.4" ry="1.6" fill="#2C2017"/>
    <!-- nose hint -->
    <path d="M32 28 q 0 3 -1.4 4" stroke="#D9A481" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    <!-- friendly smile -->
    <path d="M27.5 33 Q 32 36.5 36.5 33" stroke="#3B2A1B" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- subtle cheek -->
    <circle cx="24" cy="32" r="1.4" fill="#F1A089" opacity="0.4"/>
    <circle cx="40" cy="32" r="1.4" fill="#F1A089" opacity="0.4"/>
  </g>
  <!-- thin Sber-green ring -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="#21A038" stroke-width="2"/>
</svg>
